name: openfoam

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: setup openfoam
      run: |
        curl -s https://dl.openfoam.com/add-debian-repo.sh | sudo bash
        sudo apt-get install libglu1-mesa
        sudo apt-get update
        sudo apt-get install openfoam2512-default
    - name: compile library
      run: |
        export WM_NCOMPPROCS=2
        openfoam2512 -c ./Allwmake
        openfoam2512 -c "cd modules/multiDimAMR && ./Allwmake"
        openfoam2512 -c ./get-gmsh.sh
    - name: test
      run: |
        python -m pip install --upgrade pip
        pip install oftest scipy casefoam
        openfoam2512 -c "py.test  --writeNSteps=1 run/"
        openfoam2512 -c "py.test -m 'not slow'"

    - name: upload logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs
