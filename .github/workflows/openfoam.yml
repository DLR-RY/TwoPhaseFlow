name: openfoam

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:        # manual trigger as fallback

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OF_VERSION: "2512"

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          COUNT=$(git log --oneline --since="24 hours ago" | wc -l)
          echo "has_commits=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

  build-and-test:
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    container: opencfd/openfoam-dev:2512   # keep in sync with OF_VERSION above
    defaults:
      run:
        shell: bash

    steps:
    - name: install git
      run: apt-get update && apt-get install -y git
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: compile library
      run: |
        OF_BASHRC=$(find /usr /opt -name "bashrc" -path "*openfoam*" 2>/dev/null | head -1)
        echo "Found OpenFOAM bashrc at: $OF_BASHRC"
        source "$OF_BASHRC"
        export WM_NCOMPPROCS=2
        ./Allwmake
        cd modules/multiDimAMR && ./Allwmake
        cd $GITHUB_WORKSPACE && ./get-gmsh.sh
    - name: test
      run: |
        OF_BASHRC=$(find /usr /opt -name "bashrc" -path "*openfoam*" 2>/dev/null | head -1)
        source "$OF_BASHRC"
        python -m pip install --upgrade pip
        pip install oftest scipy casefoam
        py.test --writeNSteps=1 run/
        py.test -m 'not slow'

    - name: upload logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs
