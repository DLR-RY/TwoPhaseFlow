name: openfoam

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:        # manual trigger as fallback

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OF_VERSION: "2512"

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          COUNT=$(git log --oneline --since="24 hours ago" | wc -l)
          echo "has_commits=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

  build-and-test:
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    container: opencfd/openfoam-dev:2512   # keep in sync with OF_VERSION above
    defaults:
      run:
        shell: bash -l {0}   # login shell sources /etc/profile.d/ incl. OpenFOAM setup

    steps:
    - name: install dependencies
      run: |
        apt-get update && apt-get install -y \
          git python3 python3-pip \
          libgl1 libglu1-mesa \
          libx11-6 libxrender1 libxext6 libxi6 libxrandr2 libxcursor1 libxinerama1
        ln -s /usr/bin/python3 /usr/local/bin/python
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: compile library
      run: |
        export WM_NCOMPPROCS=2
        ./Allwmake
        cd modules/multiDimAMR && ./Allwmake
        cd $GITHUB_WORKSPACE && ./get-gmsh.sh
    - name: test
      env:
        OMPI_ALLOW_RUN_AS_ROOT: "1"
        OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
      run: |
        pip install --break-system-packages oftest scipy casefoam
        python -m pytest --writeNSteps=1 run/
        python -m pytest -m 'not slow'

    - name: upload logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs
